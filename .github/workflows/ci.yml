name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Run tests
        run: cargo test --workspace --exclude clipster-app

  # ── Self-hosted: CLI cross-compile + macOS DMGs ──────

  build-cli:
    name: CLI + macOS DMGs
    runs-on: [self-hosted, macOS, ARM64]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-build-

      - name: Install tools
        run: |
          rustup target add x86_64-apple-darwin x86_64-pc-windows-gnu x86_64-unknown-linux-gnu
          which zig || brew install zig
          which cargo-zigbuild || cargo install cargo-zigbuild
          which cargo-tauri || cargo install tauri-cli

      - name: Build CLI (macOS ARM64)
        run: cargo build --release -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (macOS x86_64)
        run: cargo build --release --target x86_64-apple-darwin -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (Linux x86_64)
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (Windows x86_64)
        run: cargo zigbuild --release --target x86_64-pc-windows-gnu -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build Tauri (macOS ARM64)
        run: cd clipster-app && cargo tauri build

      - name: Build Tauri (macOS x86_64)
        run: cd clipster-app && cargo tauri build --target x86_64-apple-darwin

      - name: Package Linux
        run: |
          DIR="clipster-linux-x64"
          mkdir -p "$DIR"
          cp target/x86_64-unknown-linux-gnu/release/clipster-{server,agent,cli} "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Package Windows
        run: |
          DIR="clipster-windows-x64"
          mkdir -p "$DIR"
          cp target/x86_64-pc-windows-gnu/release/clipster-{server,agent,cli}.exe "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Build fat DMGs
        run: |
          for ARCH in aarch64 x86_64; do
            if [ "$ARCH" = "aarch64" ]; then
              SRC_DMG=$(ls target/release/bundle/dmg/*.dmg)
              BIN_DIR="target/release"
            else
              SRC_DMG=$(ls target/x86_64-apple-darwin/release/bundle/dmg/*.dmg)
              BIN_DIR="target/x86_64-apple-darwin/release"
            fi
            MOUNT=$(mktemp -d)
            hdiutil attach "$SRC_DMG" -mountpoint "$MOUNT" -nobrowse -quiet
            STAGE=$(mktemp -d)
            cp -R "$MOUNT"/* "$STAGE"/
            hdiutil detach "$MOUNT" -quiet
            cp "${BIN_DIR}/clipster-server" "$STAGE/"
            cp "${BIN_DIR}/clipster-cli" "$STAGE/"
            hdiutil create -srcfolder "$STAGE" -volname "Clipster" -format UDZO -o "Clipster_macOS_${ARCH}.dmg"
            rm -rf "$STAGE"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: clipster-linux-x64
          path: clipster-linux-x64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: clipster-windows-x64
          path: clipster-windows-x64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-macOS-aarch64
          path: Clipster_macOS_aarch64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-macOS-x86_64
          path: Clipster_macOS_x86_64.dmg

  # ── GitHub-hosted: Linux Tauri app ───────────────────

  build-linux-app:
    name: Linux App
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-app-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-app-

      - name: Build Tauri (Linux x86_64)
        run: cd clipster-app && cargo tauri build

      - name: Package AppImage + deb
        run: |
          mkdir -p linux-app
          cp target/release/bundle/appimage/*.AppImage linux-app/Clipster_linux_x86_64.AppImage 2>/dev/null || true
          cp target/release/bundle/deb/*.deb linux-app/Clipster_linux_x86_64.deb 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-linux-app
          path: linux-app/

  # ── GitHub-hosted: Windows Tauri app ─────────────────

  build-windows-app:
    name: Windows App
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-app-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-app-

      - name: Build Tauri (Windows x86_64)
        run: cd clipster-app && cargo tauri build

      - name: Package MSI + EXE
        shell: bash
        run: |
          mkdir -p windows-app
          cp target/release/bundle/msi/*.msi windows-app/Clipster_windows_x86_64.msi 2>/dev/null || true
          cp target/release/bundle/nsis/*.exe windows-app/Clipster_windows_x86_64_setup.exe 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-windows-app
          path: windows-app/

  # ── Release ──────────────────────────────────────────

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-cli, build-linux-app, build-windows-app]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: find . -type f | sort

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            clipster-*.tar.gz \
            Clipster_*.dmg \
            Clipster_*.AppImage \
            Clipster_*.deb \
            Clipster_*.msi \
            Clipster_*_setup.exe \
            || true
