name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Run tests
        run: cargo test --workspace --exclude clipster-app

  build:
    name: Build
    runs-on: [self-hosted, macOS, ARM64]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-build-

      - name: Install tools
        run: |
          rustup target add x86_64-apple-darwin x86_64-pc-windows-gnu x86_64-unknown-linux-gnu
          which zig || brew install zig
          which cargo-zigbuild || cargo install cargo-zigbuild
          which cargo-tauri || cargo install tauri-cli

      # ── CLI tools (all platforms) ────────────────────

      - name: Build CLI (macOS ARM64, native)
        run: cargo build --release -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (macOS x86_64, cross)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo zigbuild --release --target x86_64-apple-darwin -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (Linux x86_64, cross)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo zigbuild --release --target x86_64-unknown-linux-gnu -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build CLI (Windows x86_64, cross)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p clipster-server -p clipster-agent -p clipster-cli

      # ── macOS DMGs ───────────────────────────────────

      - name: Build Tauri (macOS ARM64)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cd clipster-app && cargo tauri build

      - name: Build Tauri (macOS x86_64)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cd clipster-app && cargo tauri build --target x86_64-apple-darwin

      # ── Package ──────────────────────────────────────

      - name: Package Linux
        run: |
          DIR="clipster-linux-x64"
          mkdir -p "$DIR"
          cp target/x86_64-unknown-linux-gnu/release/clipster-{server,agent,cli} "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Package Windows
        run: |
          DIR="clipster-windows-x64"
          mkdir -p "$DIR"
          cp target/x86_64-pc-windows-gnu/release/clipster-{server,agent,cli}.exe "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Build fat DMGs (app + CLI tools)
        run: |
          # ARM64: mount, copy binaries in, repack
          for ARCH in aarch64 x86_64; do
            if [ "$ARCH" = "aarch64" ]; then
              SRC_DMG=$(ls target/release/bundle/dmg/*.dmg)
              BIN_DIR="target/release"
              EXT=""
            else
              SRC_DMG=$(ls target/x86_64-apple-darwin/release/bundle/dmg/*.dmg)
              BIN_DIR="target/x86_64-apple-darwin/release"
              EXT=""
            fi

            MOUNT=$(mktemp -d)
            hdiutil attach "$SRC_DMG" -mountpoint "$MOUNT" -nobrowse -quiet
            STAGE=$(mktemp -d)
            cp -R "$MOUNT"/* "$STAGE"/
            hdiutil detach "$MOUNT" -quiet

            # Add CLI tools to the DMG root
            cp "${BIN_DIR}/clipster-server${EXT}" "$STAGE/"
            cp "${BIN_DIR}/clipster-agent${EXT}" "$STAGE/"
            cp "${BIN_DIR}/clipster-cli${EXT}" "$STAGE/"

            hdiutil create -srcfolder "$STAGE" -volname "Clipster" -format UDZO -o "Clipster_${ARCH}.dmg"
            rm -rf "$STAGE"
          done

      # ── Upload ───────────────────────────────────────

      - uses: actions/upload-artifact@v4
        with:
          name: clipster-linux-x64
          path: clipster-linux-x64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: clipster-windows-x64
          path: clipster-windows-x64.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-aarch64.dmg
          path: Clipster_aarch64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Clipster-x86_64.dmg
          path: Clipster_x86_64.dmg

  release:
    name: Release
    runs-on: [self-hosted, macOS, ARM64]
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            clipster-*.tar.gz \
            Clipster_*.dmg
