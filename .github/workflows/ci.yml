name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-test-

      - name: Run tests
        run: cargo test --workspace --exclude clipster-app

  build:
    name: Build
    runs-on: [self-hosted, macOS, ARM64]
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-build-

      - name: Install cross-compilation tools
        run: |
          rustup target add x86_64-pc-windows-gnu x86_64-unknown-linux-gnu
          which zig || brew install zig
          which cargo-zigbuild || cargo install cargo-zigbuild

      - name: Build macOS (native)
        run: cargo build --release -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build Linux (cross)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo zigbuild --release --target x86_64-unknown-linux-gnu -p clipster-server -p clipster-agent -p clipster-cli

      - name: Build Windows (cross)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo zigbuild --release --target x86_64-pc-windows-gnu -p clipster-server -p clipster-agent -p clipster-cli

      - name: Package macOS
        run: |
          DIR="clipster-macos-arm64"
          mkdir -p "$DIR"
          cp target/release/clipster-server target/release/clipster-agent target/release/clipster-cli "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Package Linux
        run: |
          DIR="clipster-linux-x64"
          mkdir -p "$DIR"
          cp target/x86_64-unknown-linux-gnu/release/clipster-server target/x86_64-unknown-linux-gnu/release/clipster-agent target/x86_64-unknown-linux-gnu/release/clipster-cli "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Package Windows
        run: |
          DIR="clipster-windows-x64"
          mkdir -p "$DIR"
          cp target/x86_64-pc-windows-gnu/release/clipster-server.exe target/x86_64-pc-windows-gnu/release/clipster-agent.exe target/x86_64-pc-windows-gnu/release/clipster-cli.exe "$DIR/"
          cp README.md "$DIR/"
          tar czf "${DIR}.tar.gz" "$DIR"

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: clipster-macos-arm64
          path: clipster-macos-arm64.tar.gz

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: clipster-linux-x64
          path: clipster-linux-x64.tar.gz

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: clipster-windows-x64
          path: clipster-windows-x64.tar.gz

  release:
    name: Release
    runs-on: [self-hosted, macOS, ARM64]
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            clipster-*.tar.gz
